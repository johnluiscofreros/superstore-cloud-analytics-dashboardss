  <!DOCTYPE html>
<html>
<head>
  <title>Superstore Analytics Dashboard</title>
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

  <style>
    body {
      font-family: Arial;
      padding: 20px;
      background: #f5f5f5;
    }

    h2 {
      text-align: center;
    }

    .kpi-container {
      display: flex;
      justify-content: space-around;
      flex-wrap: wrap;
      margin-bottom: 20px;
      gap: 10px;
    }

    .kpi {
      background: white;
      padding: 15px;
      border-radius: 10px;
      width: 30%;
      min-width: 150px;
      text-align: center;
      box-shadow: 0px 2px 6px rgba(0,0,0,0.1);
    }

    select {
      display: block;
      margin: 10px auto;
      padding: 8px;
      border-radius: 5px;
    }

    .ai-section {
      background: white;
      max-width: 900px;
      margin: 20px auto;
      padding: 18px;
      border-radius: 10px;
      box-shadow: 0px 2px 6px rgba(0,0,0,0.1);
      text-align: center;
    }

    .ai-section h3 {
      margin-top: 0;
    }

    .ai-section p {
      color: #555;
    }

    .ai-section button {
      background: #2f80ed;
      color: white;
      border: none;
      padding: 10px 18px;
      border-radius: 6px;
      cursor: pointer;
      margin: 10px 0;
      font-size: 14px;
    }

    .ai-section button:hover {
      background: #1f6fd1;
    }

    #aiResult {
      margin-top: 12px;
      background: #f5f8ff;
      padding: 12px;
      border-radius: 8px;
      text-align: left;
      min-height: 50px;
      line-height: 1.5;
    }

    canvas {
      background: white;
      padding: 10px;
      margin-top: 20px;
      border-radius: 10px;
      width: 100%;
      max-width: 900px;
      display: block;
      margin-left: auto;
      margin-right: auto;
    }
  </style>
</head>

<body>

<h2>Superstore Sales Dashboard</h2>

<select id="filter">
  <option>All Regions</option>
  <option>West</option>
  <option>East</option>
  <option>Central</option>
  <option>South</option>
</select>

<div class="kpi-container">
  <div class="kpi">
    <h3>Total Sales</h3>
    <p>805,853.84</p>
  </div>

  <div class="kpi">
    <h3>Avg Sales</h3>
    <p>91.58</p>
  </div>

  <div class="kpi">
    <h3>Regions</h3>
    <p>4</p>
  </div>
</div>

<div class="ai-section">
  <h3>AI Business Insight</h3>
  <p>Generate an AI-powered recommendation based on the Superstore sales summary.</p>
  <button onclick="generateInsight()">Generate Insight</button>
  <div id="aiResult">Click the button to generate an insight.</div>
</div>

<canvas id="barChart"></canvas>
<canvas id="pieChart"></canvas>
<canvas id="lineChart"></canvas>

<script>
const categories = ["Furniture", "Office Supplies", "Technology"];

const dataByRegion = {
  "All Regions": [242870.19, 337876.47, 225107.17],
  "West": [80000, 110000, 70000],
  "East": [60000, 90000, 50000],
  "Central": [50000, 70000, 40000],
  "South": [52000, 87000, 55000]
};

let barChart = new Chart(document.getElementById("barChart"), {
  type: "bar",
  data: {
    labels: categories,
    datasets: [{
      label: "Total Sales per Category",
      data: dataByRegion["All Regions"]
    }]
  }
});

let pieChart = new Chart(document.getElementById("pieChart"), {
  type: "pie",
  data: {
    labels: categories,
    datasets: [{
      data: dataByRegion["All Regions"]
    }]
  }
});

let lineChart = new Chart(document.getElementById("lineChart"), {
  type: "line",
  data: {
    labels: ["Q1", "Q2", "Q3"],
    datasets: [{
      label: "Sales Trend",
      data: [200000, 260000, 345000],
      fill: false
    }]
  }
});

document.getElementById("filter").addEventListener("change", function () {
  const selected = this.value;
  const newData = dataByRegion[selected];

  barChart.data.datasets[0].data = newData;
  barChart.update();

  pieChart.data.datasets[0].data = newData;
  pieChart.update();
});

async function generateInsight() {
  const resultBox = document.getElementById("aiResult");
  resultBox.innerText = "Generating AI insight...";

  try {
    const response = await fetch("/.netlify/functions/ai-insight");
    const data = await response.json();
    resultBox.innerText = data.insight;
  } catch (error) {
    resultBox.innerText = "Error generating AI insight.";
  }
}
</script>

</body>
</html>
